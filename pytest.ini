[pytest]
# pytest configuration for Speechify iOS QA Framework

# Test discovery — where pytest looks for tests
testpaths = tests

# Naming conventions
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers (used with @pytest.mark.X on tests)
markers =
    smoke: Critical P0 tests — must pass before anything ships
    functional: Feature-level functional tests
    regression: Full regression suite run before release
    edge_case: Boundary and edge case tests
    priority_p0: Release blocker — must pass
    priority_p1: Important — fix before release
    priority_p2: Minor — can ship with known issue

# Output format
addopts =
    -v
    --tb=short
    --strict-markers

# Log settings
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
